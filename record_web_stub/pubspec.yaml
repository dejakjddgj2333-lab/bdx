name: record_web
description: Web stub for record plugin to avoid version conflicts.
version: 2.1.0
publish_to: none

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.0.0'

dependencies:
  flutter:
    sdk: flutter
  record_platform_interface: ^2.1.0

flutter:
  plugin:
    platforms:
      web:
        pluginClass: RecordPluginWebStub
        fileName: record_web_stub.dart
