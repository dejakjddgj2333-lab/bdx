name: beidouxing_app_flutter
description: "北斗星AI Flutter 客户端"
publish_to: 'none'
version: 1.0.5+11

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # 状态管理
  flutter_bloc: ^8.1.6
  equatable: ^2.0.7

  # 路由
  go_router: ^14.1.4

  # HTTP
  dio: ^5.7.0
  json_annotation: ^4.9.0

  # 本地存储
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  flutter_secure_storage: ^9.2.2

  # 依赖注入
  get_it: ^7.7.0
  injectable: ^2.4.2

  # UI / Markdown
  flutter_markdown: ^0.7.3
  shimmer: ^3.0.0
  flutter_slidable: ^3.1.1
  fluttertoast: ^8.2.8
  flutter_screenutil: ^5.9.3

  # 图片
  image_picker: ^1.1.2
  flutter_image_compress: ^2.3.0

  # 音频 / 语音通话
  record: ^5.2.1
  flutter_pcm_sound:
    path: ./packages/flutter_pcm_sound
  audio_session: ^0.1.25

  # WebSocket
  web_socket_channel: ^3.0.1

  # 权限
  permission_handler: ^11.3.1

  # 工具
  path_provider: ^2.1.4
  intl: ^0.19.0
  crypto: ^3.0.5

  # 网络图片
  cached_network_image: ^3.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.6

  # 代码生成
  build_runner: ^2.4.11
  injectable_generator: ^2.6.1
  hive_generator: ^2.0.1
  json_serializable: ^6.8.0

dependency_overrides:
  record_platform_interface: ^2.1.0
  record_linux: ^2.1.0
  record_web:
    path: ./record_web_stub

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/fonts/
